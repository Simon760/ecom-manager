<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcomManager</title>
  <!--
    GitHub Pages 404 SPA Redirect
    Redirige toutes les URL inconnues vers index.html en préservant le chemin.
    Solution standard pour les SPA sur GitHub Pages.
  -->
  <script>
    // Récupère le basePath depuis le sessionStorage (défini dans index.html)
    var basePath = '';
    var l = window.location;
    var pathSegmentsToKeep = basePath ? 1 : 0;
    var path = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
    var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      (basePath || '') + '/?p=/' + path + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash;
    l.replace(redirectUrl);
  </script>
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#09090b;color:#a1a1aa;font-family:system-ui;font-size:14px;">
    Redirection…
  </div>
</body>
</html>
